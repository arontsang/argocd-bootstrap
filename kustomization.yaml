apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - https://raw.githubusercontent.com/argoproj/argo-cd/refs/tags/stable/manifests/install.yaml
  - ./00-bootstrap.yaml
  - ./00-kustomize-helm.yaml

patches:
  - target:
      kind: ConfigMap
      name: argocd-cm
    patch: |-
      data:
        kustomize.buildOptions: --enable-helm  
