apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: 00-bootstrap
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: '${REPO_URL}'
        revision: '${TARGET_REF}'
        directories:
          - path: apps/*  # Wildcard matches all subdirectories under apps/
  template:
    metadata:
      name: '{{path.basename}}' # Extracts the directory name dynamically
    spec:
      project: default
      source:
        repoURL: 'https://github.com'
        targetRevision: HEAD
        path: '{{path}}' # Resolves to the specific directory found by the wildcard
      destination:
        server: 'https://kubernetes.default.svc'
        namespace: '{{path.basename}}'
