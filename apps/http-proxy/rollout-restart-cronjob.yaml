apiVersion: v1
kind: ServiceAccount
metadata:
  name: rollout-restarter
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rollout-restarter
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["smart-proxy"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rollout-restarter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rollout-restarter
subjects:
  - kind: ServiceAccount
    name: rollout-restarter
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: rollout-restart-smart-proxy
spec:
  schedule: "0 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: rollout-restarter
          restartPolicy: Never
          containers:
            - name: kubectl
              image: bitnami/kubectl:latest
              command:
                - kubectl
                - rollout
                - restart
                - deployment/smart-proxy
                - -n
                - http-proxy
