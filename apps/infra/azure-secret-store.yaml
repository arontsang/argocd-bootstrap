apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: azure-kv-cluster-store
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity # Changed from ManagedIdentity
      vaultUrl: https://kube-secrets.vault.azure.net/
      tenantId: 4d0ec782-1b23-4888-ba2b-a2a62eba6abc
      identityId: 921f9e20-c43a-442c-9905-c8dc5c4bcbe2
      serviceAccountRef:
        name: external-secrets
        namespace: external-secrets
---
apiVersion: external-secrets.io/v1  # <-- Update this too
kind: ExternalSecret
metadata:
  name: test-secret
  namespace: default
spec:
  refreshInterval: "24h"
  secretStoreRef:
    name: azure-kv-cluster-store
    kind: ClusterSecretStore
  target:
    name: test-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: foobar